name: Publish to PyPI

# Publishes on a version tag (e.g. v0.1.0). Uses PyPI Trusted Publishing (OIDC) —
# configure the project's trusted publisher in PyPI project settings, no token
# secret needed. Ensure pyproject `version` matches the tag before tagging.
on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
